<!DOCTYPE html>
<html>
  <head>
    <title>$GODOT_PROJECT_NAME</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    $GODOT_HEAD_INCLUDE
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%; height: 100%;
        background: #000;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      canvas {
        display: block;
        aspect-ratio: 1920 / 1080;
        width: min(100vw, calc(100vh * 1920 / 1080));
        height: auto;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        -khtml-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
        outline: none;
        -webkit-tap-highlight-color: rgba(255, 255, 255, 0); /* mobile webkit */
      }
    </style>
    <script>
      (function () {
        const TOKEN_KEY = 'oauth_token'

        // If the OAuth redirect landed a token in the URL hash, persist it and clean the URL.
        const hash = new URLSearchParams(window.location.hash.slice(1))
        const hashToken = hash.get('oauth_token')
        if (hashToken) {
          localStorage.setItem(TOKEN_KEY, hashToken)
          history.replaceState(null, '', window.location.pathname)
        }

        // Check for an auth error from the OAuth callback.
        const hashError = hash.get('auth_error') || new URLSearchParams(window.location.search).get('auth_error')
        if (hashError) {
          localStorage.removeItem(TOKEN_KEY)
          window.location.href = '/auth/twitch'
          return
        }

        const token = localStorage.getItem(TOKEN_KEY)
        if (!token) {
          window.location.href = '/auth/twitch'
          return
        }

        // Expose the token so Godot can read it via JavaScriptBridge before the engine starts.
        window.oauthToken = token
      })()
    </script>
  </head>
  <body>
    <canvas id="canvas" width="1920" height="1080"></canvas>
    <script>
      window.addEventListener("error", function(e) {
        console.error("[window.onerror]", e.message, e.filename, e.lineno);
      });
      window.addEventListener("unhandledrejection", function(e) {
        console.error("[unhandledrejection]", e.reason);
      });
    </script>
    <script src="$GODOT_URL" onload="console.log('[index.js] loaded, Engine defined:', typeof Engine !== 'undefined')" onerror="console.error('[index.js] FAILED TO LOAD')"></script>
    <script>
      var GCS_BASE = 'https://storage.googleapis.com/twitchextensionserver-static';
      var IS_LOCAL = window.location.hostname === 'localhost';

      function startGodot() {
        console.log("[startGodot] called, Engine defined:", typeof Engine !== "undefined");
        console.log("[startGodot] crossOriginIsolated:", window.crossOriginIsolated);
        console.log("[startGodot] SharedArrayBuffer available:", typeof SharedArrayBuffer !== "undefined");
        // In production, fetch index.pck directly from GCS (large, no special headers needed).
        // index.wasm must go through Cloud Run (/index.wasm route) because only index.wasm.gz
        // exists in GCS; Cloud Run fetches it and re-serves it with Content-Encoding: gzip.
        // pthread workers also fetch index.wasm as a relative URL, so same-origin is required.
        var config = IS_LOCAL ? $GODOT_CONFIG : Object.assign({}, $GODOT_CONFIG, {
          mainPack: GCS_BASE + '/index.pck',
        });
        console.log("[startGodot] config.executable:", config.executable);
        console.log("[startGodot] config.mainPack:", config.mainPack);
        const engine = new Engine(config);
        engine.startGame({
          canvas: document.getElementById("canvas"),
        }).then(function() {
          console.log("[startGodot] engine.startGame() resolved successfully");
        }).catch(function (err) {
          console.error("[startGodot] Godot startup failed:", err);
        });
      }

      function waitForSize(callback) {
        const canvas = document.getElementById("canvas");
        console.log("[waitForSize] canvas size:", canvas.offsetWidth, "x", canvas.offsetHeight);
        if (canvas.offsetWidth > 0 && canvas.offsetHeight > 0) {
          callback();
          return;
        }
        const observer = new ResizeObserver(function (entries) {
          for (const entry of entries) {
            console.log("[waitForSize] ResizeObserver fired:", entry.contentRect.width, "x", entry.contentRect.height);
            if (entry.contentRect.width > 0 && entry.contentRect.height > 0) {
              observer.disconnect();
              callback();
              return;
            }
          }
        });
        observer.observe(canvas);
      }

      window.addEventListener("load", function () {
        console.log("[load] event fired, calling waitForSize");
        waitForSize(startGodot);
      });
    </script>
  </body>
</html>
