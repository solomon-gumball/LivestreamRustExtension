<!DOCTYPE html>
<html>
  <head>
    <title>$GODOT_PROJECT_NAME</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    $GODOT_HEAD_INCLUDE
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%; height: 100%;
        background: #000;
        overflow: hidden;
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
    </style>
    <script>
      (function () {
        const TOKEN_KEY = 'oauth_token'

        // If the OAuth redirect landed a token in the URL hash, persist it and clean the URL.
        const hash = new URLSearchParams(window.location.hash.slice(1))
        const hashToken = hash.get('oauth_token')
        if (hashToken) {
          localStorage.setItem(TOKEN_KEY, hashToken)
          history.replaceState(null, '', window.location.pathname)
        }

        // Check for an auth error from the OAuth callback.
        const hashError = hash.get('auth_error') || new URLSearchParams(window.location.search).get('auth_error')
        if (hashError) {
          localStorage.removeItem(TOKEN_KEY)
          window.location.href = '/auth/twitch'
          return
        }

        const token = localStorage.getItem(TOKEN_KEY)
        if (!token) {
          window.location.href = '/auth/twitch'
          return
        }

        // Expose the token so Godot can read it via JavaScriptBridge before the engine starts.
        window.oauthToken = token
      })()
    </script>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <script src="$GODOT_URL"></script>
    <script>
      function startGodot() {
        const engine = new Engine($GODOT_CONFIG);
        engine.startGame({
          canvas: document.getElementById("canvas"),
        }).catch(function (err) {
          console.error("Godot startup failed:", err);
        });
      }

      function waitForSize(callback) {
        const canvas = document.getElementById("canvas");
        if (canvas.offsetWidth > 0 && canvas.offsetHeight > 0) {
          callback();
          return;
        }
        const observer = new ResizeObserver(function (entries) {
          for (const entry of entries) {
            if (entry.contentRect.width > 0 && entry.contentRect.height > 0) {
              observer.disconnect();
              callback();
              return;
            }
          }
        });
        observer.observe(canvas);
      }

      window.addEventListener("load", function () {
        waitForSize(startGodot);
      });
    </script>
  </body>
</html>
